<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Help &amp; Contact &mdash; Auto Everything Flow</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a10;
      color: #e2e8f0;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }
    .card {
      max-width: 480px;
      width: 100%;
      background: rgba(124,58,237,0.04);
      border: 1px solid rgba(124,58,237,0.15);
      border-radius: 20px;
      padding: 48px 36px;
      text-align: center;
    }
    .icon {
      font-size: 48px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }
    .sub {
      color: #94a3b8;
      font-size: 15px;
      margin-bottom: 32px;
    }
    .email-link {
      display: inline-block;
      padding: 14px 32px;
      background: linear-gradient(135deg, #7c3aed, #6d28d9);
      color: #fff;
      text-decoration: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .email-link:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(124,58,237,0.4);
    }
    .back {
      margin-top: 24px;
      color: #64748b;
      font-size: 13px;
    }
    .back a {
      color: #a78bfa;
      text-decoration: none;
    }
    .back a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">&#x1F4E7;</div>
    <h1>Help &amp; Contact</h1>
    <p class="sub">Need help, want to report a bug, or have a suggestion? Reach out to us.</p>
    <a href="mailto:autoeverythingflow@gmail.com" class="email-link">autoeverythingflow@gmail.com</a>
    <p class="back"><a href="index.html">&larr; Back to Home</a></p>
  </div>
</body>
</html>
